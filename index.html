<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <article data-testid="test-todo-card" class="todo-card">
        <!-- Completion Toggle -->
        <div class="header">
          <input
            type="checkbox"
            id="toggle"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
          <label for="toggle">Mark as complete</label>
        </div>

        <!-- Title -->
        <h2 data-testid="test-todo-title">Finish UI Design</h2>

        <div data-testid="test-todo-collapsible-section" id="collapsible">
          <p data-testid="test-todo-description">
            Complete the dashboard layout and finalize spacing system. Add
            consistent padding, align components properly, review mobile
            responsiveness, test interactions, and finalize UI components before
            handoff.
          </p>
        </div>

        <button
          data-testid="test-todo-expand-toggle"
          id="expand-btn"
          aria-expanded="false"
        >
          Show more
        </button>

        <!-- Priority -->
        <span data-testid="test-todo-priority" class="priority high">
          High
        </span>

        <!-- Due Date -->
        <time
          data-testid="test-todo-due-date"
          datetime="2026-04-20T18:00:00"
          id="due-date"
        >
          Due Apr 20, 2026
        </time>

        <!-- Time Remaining -->
        <time
          data-testid="test-todo-time-remaining"
          id="time-remaining"
          aria-live="polite"
        >
        </time>

        <!-- Status -->
        <span data-testid="test-todo-status" id="status"> Pending </span>

        <!-- Tags -->
        <ul data-testid="test-todo-tags" class="tags">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
          <li>design</li>
        </ul>

        <!-- Actions -->
        <div class="actions">
          <button data-testid="test-todo-edit-button">Edit</button>

          <button data-testid="test-todo-delete-button">Delete</button>
        </div>
        <!-- 👇 ADD IT HERE -->
        <form data-testid="test-todo-edit-form" class="edit-form hidden">
          <input
            type="text"
            data-testid="test-todo-edit-title-input"
            placeholder="Edit title"
          />

          <div class="edit-actions">
            <button type="submit">Save</button>
            <button type="button" id="cancel-edit">Cancel</button>
          </div>
        </form>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
